<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0c1222 0%, #151030 35%, #1a0a2e 65%, #0f172a 100%);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.1s forwards;
    }

    .icon {
      width: 64px;
      height: 64px;
    }

    .wordmark {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #e2e8f0;
    }

    .loader {
      display: flex;
      gap: 6px;
      margin-top: 32px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.4s forwards;
    }

    .loader span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #818cf8;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="brand">
    <!-- Clean envelope icon -->
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
      <rect x="4" y="12" width="56" height="40" rx="6" fill="#818cf8" opacity="0.15"/>
      <rect x="4" y="12" width="56" height="40" rx="6" stroke="#818cf8" stroke-width="2.5"/>
      <path d="M4 20l28 20 28-20" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="wordmark">Email</span>
  </div>

  <div class="loader">
    <span></span>
    <span></span>
    <span></span>
  </div>
</body>
</html>
