name: Build & Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.1.0)"
        type: string
        required: false
      release_id:
        description: "Existing GitHub release ID to upload assets to"
        type: string
        required: false
  workflow_dispatch:
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - run: npm ci

      - name: Build and upload to existing release
        if: inputs.release_id
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ inputs.release_id }}
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

      - name: Build and create release
        if: ${{ !inputs.release_id }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Email v__VERSION__"
          releaseBody: "See the assets below to download for your platform."
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - name: Check if Apple signing is configured
        id: signing-check
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple signing certificate
        if: steps.signing-check.outputs.has_signing == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and upload (signed + notarized)
        if: steps.signing-check.outputs.has_signing == 'true' && inputs.release_id
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ inputs.release_id }}
          updaterJsonKeepUniversal: true
          args: --target universal-apple-darwin

      - name: Build and release (signed + notarized)
        if: steps.signing-check.outputs.has_signing == 'true' && !inputs.release_id
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Email v__VERSION__"
          releaseBody: "See the assets below to download for your platform."
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: --target universal-apple-darwin

      - name: Build and upload (unsigned)
        if: steps.signing-check.outputs.has_signing != 'true' && inputs.release_id
        id: build-upload-unsigned
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ inputs.release_id }}
          updaterJsonKeepUniversal: true
          args: --target universal-apple-darwin

      - name: Build and release (unsigned)
        if: steps.signing-check.outputs.has_signing != 'true' && !inputs.release_id
        id: build-release-unsigned
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Email v__VERSION__"
          releaseBody: |
            See the assets below to download for your platform.

            > **macOS users**: This build is unsigned. After downloading, run:
            > ```
            > xattr -cr /Applications/Email.app
            > ```
            > Or right-click the app and select "Open" on first launch.
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: --target universal-apple-darwin

      - name: Generate and upload latest.json for updater
        if: steps.signing-check.outputs.has_signing != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          # Download the exact .tar.gz that was uploaded to the release
          # so we sign the same bytes the user will download
          gh release download "${TAG}" --pattern "*.app.tar.gz" --dir /tmp --clobber
          TAR_FILE=$(ls /tmp/*.app.tar.gz | head -1)
          echo "Signing: $TAR_FILE"

          # Sign with our updater key (no password — key was generated without one)
          npx @tauri-apps/cli signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            "$TAR_FILE"

          SIGNATURE=$(cat "${TAR_FILE}.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Email_universal.app.tar.gz"

          cat > /tmp/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the release page for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-universal": {
                "signature": "${SIGNATURE}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

          gh release upload "${TAG}" /tmp/latest.json --clobber
          echo "latest.json uploaded successfully"

      - name: Clean up keychain
        if: always() && steps.signing-check.outputs.has_signing == 'true'
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

